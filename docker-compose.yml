version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: apigateway-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apigateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apigateway-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-core:
    build:
      context: .
      dockerfile: ./gateway-core/Dockerfile
    container_name: apigateway-gateway-core
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-api:
    build:
      context: .
      dockerfile: ./admin-api/Dockerfile
    container_name: apigateway-admin-api
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apigateway-frontend
    ports:
      - "80:80"
    depends_on:
      - admin-api
      - gateway-core

volumes:
  postgres_data:
  redis_data:
